<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Crédito</title>
  <link rel="stylesheet" href="simulador.css" />
</head>

<body>
  <div class="container">
    <h1>Simulador de Crédito</h1>

    <h2>Datos financieros</h2>
    <label for="txtIngresos">Ingresos:</label>
    <input type="text" id="txtIngresos" />

    <label for="txtArriendo">Arriendo:</label>
    <input type="text" id="txtArriendo" />

    <label for="txtAlimentacion">Alimentacion:</label>
    <input type="text" id="txtAlimentacion" />

    <label for="txtVarios">Varios:</label>
    <input type="text" id="txtVarios" />

    <p>Total Gastos: <span id="lblTotalGastos">0</span></p>
    <p>Disponible: <span id="lblDisponibleValor">0</span></p>
    <p>Capacidad de pago mensual: <span id="lblCapacidadValor">0</span></p>

    <h2>Solicitud de crédito</h2>
    <label for="txtMonto">Monto:</label>
    <input type="text" id="txtMonto" />

    <label for="txtPlazo">Plazo en años:</label>
    <input type="text" id="txtPlazo" />

    <label for="txtTasaInteres">Tasa de interés:</label>
    <input type="text" id="txtTasaInteres" />

    <p>Interés a pagar: <span id="lblInteresValor">0</span></p>
    <p>Total a pagar: <span id="lblTotalValor">0</span></p>
    <p>Cuota mensual: <span id="lblCuotaValor">0</span></p>
    <p>Estado de crédito: <span id="spnEstadoCredito">ESPERANDO DATOS...</span></p>

    <div class="buttons">
      <button id="btnCalcularCredito">Calcular Crédito</button>
      <button id="btnReiniciar">Reiniciar</button>
    </div>
  </div>
  <script type="module" src="simulador.js"></script>
</body>

</html>
